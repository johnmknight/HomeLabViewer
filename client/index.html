<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeLabViewer - Network Topology</title>
  <script src="lib/cytoscape.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #e0e0e0;
      overflow: hidden;
    }
    
    /* Header */
    #header {
      height: 60px;
      background: #141824;
      border-bottom: 1px solid #2a2f3f;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: relative;
      z-index: 100;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #22d3ee;
      letter-spacing: 0.05em;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }
    
    /* Layout Controls */
    .layout-controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn {
      padding: 6px 14px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #334155;
      border-color: #475569;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #0ea5e9;
      border-color: #0ea5e9;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #0284c7;
      border-color: #0284c7;
    }
    .btn-danger {
      background: #dc2626;
      border-color: #dc2626;
      color: #fff;
    }
    .btn-danger:hover:not(:disabled) {
      background: #b91c1c;
      border-color: #b91c1c;
    }
    select {
      padding: 6px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      cursor: pointer;
      min-width: 180px;
    }
    select:hover {
      background: #334155;
      border-color: #475569;
    }
    .separator {
      width: 1px;
      height: 24px;
      background: #334155;
    }
    
    /* Main Container */
    #main-container {
      display: flex;
      height: calc(100vh - 60px);
      position: relative;
    }
    
    /* Cytoscape Container */
    #cy-container {
      flex: 1;
      position: relative;
    }
    #cy {
      width: 100%;
      height: 100%;
      background: #0a0e1a;
    }
    
    /* Sidebar */
    #sidebar {
      width: 320px;
      background: #141824;
      border-left: 1px solid #2a2f3f;
      display: none;
      flex-direction: column;
      overflow-y: auto;
    }
    #sidebar.open {
      display: flex;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #2a2f3f;
    }
    .sidebar-title {
      font-size: 14px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .sidebar-close {
      float: right;
      background: none;
      border: none;
      color: #64748b;
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .sidebar-close:hover {
      color: #e2e8f0;
    }
    .sidebar-content {
      padding: 20px;
      flex: 1;
    }
    .info-group {
      margin-bottom: 24px;
    }
    .info-label {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .info-value {
      font-size: 14px;
      color: #e2e8f0;
      margin-bottom: 8px;
    }
    .info-value.mono {
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 12px;
      color: #22d3ee;
    }
    .tag {
      display: inline-block;
      padding: 3px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      font-size: 11px;
      color: #cbd5e1;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    
    /* Context Menu */
    #context-menu {
      position: absolute;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px;
      min-width: 180px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      display: none;
      z-index: 1000;
    }
    #context-menu.show {
      display: block;
    }
    .menu-item {
      padding: 8px 12px;
      font-size: 13px;
      color: #e2e8f0;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .menu-item:hover {
      background: #334155;
    }
    .menu-separator {
      height: 1px;
      background: #334155;
      margin: 6px 0;
    }
  </style>
</head>
<body>
  <div id="header">
    <div class="status-dot"></div>
    <h1>HomeLabViewer</h1>
    <div class="layout-controls">
      <select id="layout-select" onchange="applyLayoutMode()">
        <option value="">Select Layout Mode...</option>
        <option value="zone">Zone Layout</option>
        <option value="tree">Tree Layout</option>
        <option value="lanes">Lanes Layout</option>
        <option value="physical">Physical Layout</option>
      </select>
      <button class="btn btn-primary" onclick="savePositions()">Save</button>
      <button class="btn" onclick="loadPositions()">Load</button>
      <div class="separator"></div>
      <button class="btn" onclick="resetLayout()">Reset</button>
    </div>
  </div>
  
  <div id="main-container">
    <div id="cy-container">
      <div id="cy"></div>
    </div>
    
    <div id="sidebar">
      <div class="sidebar-header">
        <button class="sidebar-close" onclick="closeSidebar()">×</button>
        <div class="sidebar-title">Device Details</div>
      </div>
      <div class="sidebar-content" id="sidebar-content">
        <p style="color: #64748b; font-size: 13px;">Select a device to view details</p>
      </div>
    </div>
  </div>
  
  <div id="context-menu">
    <div class="menu-item" onclick="contextMenuAction('details')">View Details</div>
    <div class="menu-item" onclick="contextMenuAction('center')">Center in View</div>
    <div class="menu-separator"></div>
    <div class="menu-item" onclick="contextMenuAction('copy-id')">Copy Entity ID</div>
    <div class="menu-item" onclick="contextMenuAction('copy-ip')">Copy IP Address</div>
  </div>
  
  <script>
    // State management
    let cy;
    let currentLayoutMode = '';
    let contextMenuTarget = null;
    
    // SVG icon library (Tabler icons)
    const icons = {
      'icon-router': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path fill="currentColor" d="M17 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/>
        <path fill="currentColor" d="M17 14H7a3 3 0 0 0-3 3v2h16v-2a3 3 0 0 0-3-3z"/>
        <circle fill="currentColor" cx="8" cy="18" r="1"/>
        <circle fill="currentColor" cx="12" cy="18" r="1"/>
        <circle fill="currentColor" cx="16" cy="18" r="1"/>
      </svg>`,
      
      'icon-pi': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path fill="currentColor" d="M6 4h12c1.66 0 3 1.34 3 3v2c0 1.66-1.34 3-3 3H6c-1.66 0-3-1.34-3-3V7c0-1.66 1.34-3 3-3zm1 3.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
        <path fill="currentColor" d="M6 12h12c1.66 0 3 1.34 3 3v2c0 1.66-1.34 3-3 3H6c-1.66 0-3-1.34-3-3v-2c0-1.66 1.34-3 3-3zm1 3.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
      </svg>`,
      
      'icon-streaming': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path fill="currentColor" d="M21 17H3V7h18m0-2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2z"/>
      </svg>`,
      
      'icon-esp32': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <rect fill="currentColor" x="4" y="5" width="16" height="14" rx="1"/>
        <circle fill="#0a0e1a" cx="8" cy="9" r="1.5"/>
        <circle fill="#0a0e1a" cx="16" cy="9" r="1.5"/>
        <rect fill="#0a0e1a" x="7" y="12" width="10" height="2" rx="1"/>
        <rect fill="#0a0e1a" x="7" y="15" width="10" height="2" rx="1"/>
      </svg>`,
      
      'icon-container': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <rect fill="currentColor" x="3" y="3" width="18" height="5" rx="1"/>
        <rect fill="currentColor" x="3" y="10" width="18" height="5" rx="1"/>
        <rect fill="currentColor" x="3" y="17" width="18" height="4" rx="1"/>
      </svg>`,
      
      'icon-homeassistant': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 3L4 9v12h16V9l-8-6z"/>
        <circle fill="#0a0e1a" cx="12" cy="14" r="3"/>
      </svg>`
    };
    
    // =======================
    // Layout Mode Functions
    // =======================
    
    async function applyLayoutMode() {
      const select = document.getElementById('layout-select');
      currentLayoutMode = select.value;
      
      if (!currentLayoutMode) return;
      if (!cy) {
        alert('Topology not loaded yet');
        return;
      }
      
      // Try to load saved positions for this mode first
      const loaded = await loadPositions(true);
      if (loaded) {
        console.log(`Loaded saved positions for ${currentLayoutMode} mode`);
        return;
      }
      
      // Otherwise apply the algorithmic layout
      let layoutConfig;
      
      switch (currentLayoutMode) {
        case 'zone':
          // Zone layout - grouped by parent (compound nodes)
          layoutConfig = {
            name: 'cose',
            animate: true,
            animationDuration: 1000,
            fit: true,
            padding: 50,
            nodeRepulsion: 8000,
            idealEdgeLength: 150,
            edgeElasticity: 100,
            gravity: 1,
            numIter: 1000
          };
          break;
          
        case 'tree':
          // Tree layout - hierarchical top-down
          layoutConfig = {
            name: 'breadthfirst',
            animate: true,
            animationDuration: 1000,
            fit: true,
            padding: 50,
            directed: true,
            spacingFactor: 1.5,
            avoidOverlap: true
          };
          break;
          
        case 'lanes':
          // Lanes layout - horizontal swim lanes
          layoutConfig = {
            name: 'grid',
            animate: true,
            animationDuration: 1000,
            fit: true,
            padding: 50,
            rows: 3,
            avoidOverlap: true,
            avoidOverlapPadding: 20
          };
          break;
          
        case 'physical':
          // Physical layout - force-directed like real network
          layoutConfig = {
            name: 'cose',
            animate: true,
            animationDuration: 1500,
            fit: true,
            padding: 50,
            nodeRepulsion: 10000,
            idealEdgeLength: 200,
            edgeElasticity: 150,
            gravity: 0.5,
            numIter: 2000,
            randomize: false
          };
          break;
          
        default:
          return;
      }
      
      cy.layout(layoutConfig).run();
      
      // Force fit to viewport after layout completes
      setTimeout(() => {
        cy.fit(null, 50);  // Fit all nodes with 50px padding
        cy.center();  // Center the graph
      }, layoutConfig.animationDuration + 100);
      
      console.log(`Applied ${currentLayoutMode} layout`);
    }
    
    // =======================
    // Position Save/Load Functions
    // =======================
    
    async function savePositions() {
      if (!cy) {
        alert('Topology not loaded yet');
        return;
      }
      
      if (!currentLayoutMode) {
        alert('Please select a layout mode first');
        return;
      }
      
      // Get all node positions
      const positions = {};
      cy.nodes().forEach(node => {
        const pos = node.position();
        positions[node.id()] = { x: pos.x, y: pos.y };
      });
      
      try {
        // Save to backend API
        const response = await fetch(`/api/positions/${currentLayoutMode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ positions })
        });
        
        if (response.ok) {
          console.log(`Positions saved for ${currentLayoutMode} mode (${Object.keys(positions).length} nodes)`);
          alert(`Layout saved for ${currentLayoutMode} mode!`);
        } else {
          throw new Error('Save failed');
        }
      } catch (error) {
        console.error('Failed to save positions:', error);
        alert('Failed to save layout positions');
      }
    }
    
    async function loadPositions(silent = false) {
      if (!cy) return false;
      
      if (!currentLayoutMode) {
        if (!silent) alert('Please select a layout mode first');
        return false;
      }
      
      try {
        // Load from backend API
        const response = await fetch(`/api/positions/${currentLayoutMode}`);
        if (!response.ok) {
          if (!silent) console.log(`No saved positions for ${currentLayoutMode} mode`);
          return false;
        }
        
        const data = await response.json();
        const positions = data.positions || {};
        
        if (Object.keys(positions).length === 0) {
          if (!silent) console.log('No positions found');
          return false;
        }
        
        // Apply saved positions
        let appliedCount = 0;
        cy.nodes().forEach(node => {
          const savedPos = positions[node.id()];
          if (savedPos) {
            node.position(savedPos);
            appliedCount++;
          }
        });
        
        if (!silent) {
          console.log(`Loaded ${appliedCount} positions for ${currentLayoutMode} mode`);
          alert(`Layout loaded for ${currentLayoutMode} mode!`);
        }
        return true;
      } catch (error) {
        console.error('Failed to load positions:', error);
        if (!silent) alert('Failed to load layout positions');
        return false;
      }
    }
    
    function resetLayout() {
      if (!cy || !currentLayoutMode) {
        alert('Please select a layout mode first');
        return;
      }
      
      if (!confirm(`Reset ${currentLayoutMode} layout to algorithm default?`)) {
        return;
      }
      
      // Re-apply the layout algorithm
      applyLayoutMode();
    }
    
    // =======================
    // Context Menu Functions
    // =======================
    
    function showContextMenu(event, target) {
      contextMenuTarget = target;
      const menu = document.getElementById('context-menu');
      menu.style.left = event.renderedPosition.x + 'px';
      menu.style.top = event.renderedPosition.y + 'px';
      menu.classList.add('show');
      
      // Close menu when clicking elsewhere
      setTimeout(() => {
        document.addEventListener('click', hideContextMenu, { once: true });
      }, 100);
    }
    
    function hideContextMenu() {
      document.getElementById('context-menu').classList.remove('show');
      contextMenuTarget = null;
    }
    
    function contextMenuAction(action) {
      hideContextMenu();
      
      if (!contextMenuTarget) return;
      
      const node = contextMenuTarget;
      const data = node.data();
      
      switch (action) {
        case 'details':
          showSidebar(node);
          break;
        case 'center':
          cy.center(node);
          cy.zoom({
            level: 1.5,
            position: node.position()
          });
          break;
        case 'copy-id':
          navigator.clipboard.writeText(data.id);
          console.log('Copied entity ID:', data.id);
          break;
        case 'copy-ip':
          if (data.ip) {
            navigator.clipboard.writeText(data.ip);
            console.log('Copied IP:', data.ip);
          }
          break;
      }
    }
    
    // =======================
    
    // =======================
    // Sidebar Functions
    // =======================
    
    function showSidebar(node) {
      const sidebar = document.getElementById('sidebar');
      const content = document.getElementById('sidebar-content');
      const data = node.data();
      
      // Build sidebar HTML
      let html = `
        <div class="info-group">
          <div class="info-label">Device Name</div>
          <div class="info-value">${data.label || data.id}</div>
        </div>
        
        <div class="info-group">
          <div class="info-label">Entity ID</div>
          <div class="info-value mono">${data.id}</div>
        </div>
        
        <div class="info-group">
          <div class="info-label">Group</div>
          <div class="tag">${data.group || 'Unassigned'}</div>
          <div style="font-size: 11px; color: #64748b; margin-top: 6px;">
            Source: ${data.group_source || 'unknown'}
          </div>
        </div>
        
        <div class="info-group">
          <div class="info-label">Domain</div>
          <div class="info-value">${data.domain || 'unknown'}</div>
        </div>
      `;
      
      // Add state
      if (data.state) {
        html += `
          <div class="info-group">
            <div class="info-label">State</div>
            <div class="info-value">${data.state}</div>
          </div>
        `;
      }
      
      // Add integration
      if (data.integration) {
        html += `
          <div class="info-group">
            <div class="info-label">Integration</div>
            <div class="info-value">${data.integration}</div>
          </div>
        `;
      }
      
      // Add IP if available
      if (data.ip) {
        html += `
          <div class="info-group">
            <div class="info-label">IP Address</div>
            <div class="info-value mono">${data.ip}</div>
          </div>
        `;
      }
      
      // Add manufacturer if available
      if (data.manufacturer) {
        html += `
          <div class="info-group">
            <div class="info-label">Manufacturer</div>
            <div class="info-value">${data.manufacturer}</div>
          </div>
        `;
      }
      
      // Add model if available
      if (data.model) {
        html += `
          <div class="info-group">
            <div class="info-label">Model</div>
            <div class="info-value">${data.model}</div>
          </div>
        `;
      }
      
      // Add last changed
      if (data.last_changed) {
        const date = new Date(data.last_changed);
        html += `
          <div class="info-group">
            <div class="info-label">Last Changed</div>
            <div class="info-value" style="font-size: 12px;">
              ${date.toLocaleString()}
            </div>
          </div>
        `;
      }
      
      content.innerHTML = html;
      sidebar.classList.add('open');
    }
    
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
    }
    
    // =======================
    // Initialization
    // =======================
    
    async function initializeTopology() {
      try {
        // Fetch topology data from backend
        const response = await fetch('/api/topology');
        if (!response.ok) throw new Error('Failed to fetch topology');
        
        const topologyData = await response.json();
        console.log('Loaded topology:', topologyData.nodes.length, 'nodes');
        
        // Initialize Cytoscape
        cy = cytoscape({
          container: document.getElementById('cy'),
          
          elements: topologyData,
          
          style: [
            // Device nodes (all nodes now, no compound structure)
            {
              selector: 'node',
              style: {
                'width': 60,
                'height': 60,
                'background-color': 'data(color)',
                'background-opacity': 1,
                'border-width': 3,
                'border-color': '#ffffff',
                'border-opacity': 0.5,
                'label': 'data(label)',  // Show labels
                'text-valign': 'bottom',
                'text-halign': 'center',
                'text-margin-y': 5,
                'font-size': 11,
                'font-weight': 500,
                'color': '#e2e8f0',
                'text-background-color': '#0a0e1a',
                'text-background-opacity': 0.8,
                'text-background-padding': 3,
                'text-background-shape': 'roundrectangle',
                'text-wrap': 'wrap',
                'text-max-width': 100,
                'shape': 'ellipse'
              }
            },
            
            // Selected node
            {
              selector: 'node:selected',
              style: {
                'border-width': 3,
                'border-color': '#22d3ee',
                'border-opacity': 1
              }
            },
            
            // Edges
            {
              selector: 'edge',
              style: {
                'width': 1,
                'line-color': '#334155',
                'line-opacity': 0.4,
                'curve-style': 'bezier',
                'target-arrow-shape': 'none'
              }
            }
          ],
          
          layout: {
            name: 'preset'  // Start with no layout (will be applied when mode selected)
          },
          
          minZoom: 0.5,  // Don't allow zooming out too far (was 0.3)
          maxZoom: 3,
          wheelSensitivity: 0.2,
          
          // Auto-fit on initialization
          autoungrabify: false,
          autounselectify: false
        });
        
        // Add event handlers
        
        // Single click - show sidebar
        cy.on('tap', 'node', function(evt) {
          const node = evt.target;
          showSidebar(node);
        });
        
        // Right click (cxttap) - show context menu
        cy.on('cxttap', 'node', function(evt) {
          const node = evt.target;
          showContextMenu(evt, node);
        });
        
        // Click on background - close sidebar and context menu
        cy.on('tap', function(evt) {
          if (evt.target === cy) {
            closeSidebar();
            hideContextMenu();
          }
        });
        
        console.log('Cytoscape initialized successfully');
        
        // Load the last selected layout mode
        await loadLastLayoutMode();
        
      } catch (error) {
        console.error('Failed to initialize topology:', error);
        alert('Failed to load network topology. Please refresh the page.');
      }
    }
    
    async function loadLastLayoutMode() {
      try {
        const response = await fetch('/api/layout');
        if (response.ok) {
          const data = await response.json();
          if (data.mode) {
            document.getElementById('layout-select').value = data.mode;
            currentLayoutMode = data.mode;
            console.log(`Restored layout mode: ${data.mode}`);
            await applyLayoutMode();
          }
        }
      } catch (error) {
        console.log('No saved layout mode found');
      }
    }
    
    async function saveLastLayoutMode() {
      if (!currentLayoutMode) return;
      
      try {
        await fetch('/api/layout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: currentLayoutMode })
        });
      } catch (error) {
        console.error('Failed to save layout mode:', error);
      }
    }
    
    // Save layout mode whenever it changes
    const originalApplyLayoutMode = applyLayoutMode;
    applyLayoutMode = async function() {
      await originalApplyLayoutMode();
      await saveLastLayoutMode();
    };
    
    // Initialize when page loads
    window.addEventListener('DOMContentLoaded', initializeTopology);
  </script>
</body>
</html>
