<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeLabViewer - Network Topology</title>
  <script src="lib/cytoscape.min.js"></script>
  <script src="lib/cola.min.js"></script>
  <script src="lib/cytoscape-cola.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #e0e0e0;
      overflow: hidden;
    }
    #header {
      height: 60px;
      background: #141824;
      border-bottom: 1px solid #2a2f3f;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #22d3ee;
      letter-spacing: 0.05em;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }
    #cy-container {
      height: calc(100vh - 60px);
      width: 100%;
      position: relative;
    }
    #cy {
      width: 100%;
      height: 100%;
      background: #0a0e1a;
    }
  </style>
</head>
<body>
  <div id="header">
    <div class="status-dot"></div>
    <h1>HomeLabViewer</h1>
  </div>
  <div id="cy-container">
    <div id="cy"></div>
  </div>
  
  <script>
    // Initialize Cytoscape.js topology visualization
    let cy;

    async function initTopology() {
      try {
        // Fetch topology data from API
        const response = await fetch('/api/topology');
        const data = await response.json();
        
        console.log('Fetched topology:', data);
        console.log('Total devices:', data.nodes.length);
        console.log('Total connections:', data.edges.length);
        
        // Initialize Cytoscape
        cy = cytoscape({
          container: document.getElementById('cy'),
          
          elements: {
            nodes: data.nodes,
            edges: data.edges
          },
          
          style: [
            // Node styles - use color and size from data
            {
              selector: 'node',
              style: {
                'background-color': 'data(color)',
                'label': 'data(label)',
                'color': '#e0e0e0',
                'text-valign': 'center',
                'text-halign': 'center',
                'font-size': '11px',
                'width': 'data(size)',
                'height': 'data(size)',
                'text-wrap': 'wrap',
                'text-max-width': '100px',
                'font-weight': '500'
              }
            },
            
            // Edge styles - ethernet (solid) vs wireless (dashed)
            {
              selector: 'edge',
              style: {
                'width': 2,
                'line-color': '#4ade80',
                'curve-style': 'bezier'
              }
            },
            {
              selector: 'edge[type="ethernet"]',
              style: {
                'line-style': 'solid',
                'line-color': '#58a6ff'
              }
            },
            {
              selector: 'edge[type="wireless"]',
              style: {
                'line-style': 'dashed',
                'line-color': '#f59e0b'
              }
            },
            {
              selector: 'edge[type="virtual"]',
              style: {
                'line-style': 'dotted',
                'line-color': '#6b7280'
              }
            }
          ],
          
          layout: {
            name: 'cose',
            animate: true,
            animationDuration: 1000,
            fit: true,
            padding: 50,
            nodeRepulsion: 8000,
            idealEdgeLength: 150,
            edgeElasticity: 100,
            gravity: 1,
            numIter: 1000,
            randomize: true
          }
        });
        
        // Add tooltip on hover
        cy.on('mouseover', 'node', function(evt) {
          const node = evt.target;
          const data = node.data();
          const tooltip = `
${data.label}
IP: ${data.ip}
Type: ${data.type}
${data.manufacturer ? `Manufacturer: ${data.manufacturer}` : ''}
${data.model ? `Model: ${data.model}` : ''}
Status: ${data.status}
Connection: ${data.connection_type}
          `.trim();
          
          console.log(tooltip);
        });
        
        console.log('Topology initialized successfully');
        console.log('Nodes:', cy.nodes().length);
        console.log('Edges:', cy.edges().length);
        
      } catch (error) {
        console.error('Failed to initialize topology:', error);
      }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', initTopology);
  </script>
      }
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', initTopology);
  </script>
</body>
</html>
