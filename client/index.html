<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeLabViewer - Network Topology</title>
  <script src="lib/cytoscape.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #e0e0e0;
      overflow: hidden;
    }
    #header {
      height: 60px;
      background: #141824;
      border-bottom: 1px solid #2a2f3f;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #22d3ee;
      letter-spacing: 0.05em;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }
    .layout-controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn {
      padding: 6px 14px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #334155;
      border-color: #475569;
    }
    .btn-primary {
      background: #0ea5e9;
      border-color: #0ea5e9;
      color: #fff;
    }
    .btn-primary:hover {
      background: #0284c7;
      border-color: #0284c7;
    }
    .btn-danger {
      background: #dc2626;
      border-color: #dc2626;
      color: #fff;
    }
    .btn-danger:hover {
      background: #b91c1c;
      border-color: #b91c1c;
    }
    select {
      padding: 6px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      cursor: pointer;
      min-width: 160px;
    }
    select:hover {
      background: #334155;
      border-color: #475569;
    }
    .separator {
      width: 1px;
      height: 24px;
      background: #334155;
    }
    #cy-container {
      height: calc(100vh - 60px);
      width: 100%;
      position: relative;
    }
    #cy {
      width: 100%;
      height: 100%;
      background: #0a0e1a;
    }
  </style>
</head>
<body>
  <div id="header">
    <div class="status-dot"></div>
    <h1>HomeLabViewer</h1>
    <div class="layout-controls">
      <select id="layout-select">
        <option value="">Select Layout...</option>
      </select>
      <button class="btn btn-primary" onclick="saveLayout()">Save</button>
      <button class="btn" onclick="loadLayout()">Load</button>
      <button class="btn btn-danger" onclick="deleteLayout()">Delete</button>
      <div class="separator"></div>
      <button class="btn" onclick="resetLayout()">Reset</button>
    </div>
  </div>
  <div id="cy-container">
    <div id="cy"></div>
  </div>
  
  <script>
    // SVG icon library (Tabler icons - filled versions for better visibility)
    const icons = {
      'icon-router': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path fill="currentColor" d="M17 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/>
        <path fill="currentColor" d="M17 14H7a3 3 0 0 0-3 3v2h16v-2a3 3 0 0 0-3-3z"/>
        <circle fill="currentColor" cx="8" cy="18" r="1"/>
        <circle fill="currentColor" cx="12" cy="18" r="1"/>
        <circle fill="currentColor" cx="16" cy="18" r="1"/>
      </svg>`,
      
      'icon-pi': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path fill="currentColor" d="M6 4h12c1.66 0 3 1.34 3 3v2c0 1.66-1.34 3-3 3H6c-1.66 0-3-1.34-3-3V7c0-1.66 1.34-3 3-3zm1 3.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
        <path fill="currentColor" d="M6 12h12c1.66 0 3 1.34 3 3v2c0 1.66-1.34 3-3 3H6c-1.66 0-3-1.34-3-3v-2c0-1.66 1.34-3 3-3zm1 3.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
      </svg>`,
      
      'icon-streaming': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path fill="currentColor" d="M21 17H3V7h18m0-2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2z"/>
      </svg>`,
      
      'icon-esp32': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <rect fill="currentColor" x="4" y="5" width="16" height="14" rx="1"/>
        <circle fill="#0a0e1a" cx="8" cy="9" r="1.5"/>
        <circle fill="#0a0e1a" cx="16" cy="9" r="1.5"/>
        <rect fill="#0a0e1a" x="7" y="12" width="10" height="2" rx="1"/>
        <rect fill="#0a0e1a" x="7" y="15" width="10" height="2" rx="1"/>
      </svg>`,
      
      'icon-container': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <rect fill="currentColor" x="3" y="3" width="18" height="5" rx="1"/>
        <rect fill="currentColor" x="3" y="10" width="18" height="5" rx="1"/>
        <rect fill="currentColor" x="3" y="17" width="18" height="4" rx="1"/>
      </svg>`,
      
      'icon-homeassistant': `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 3L4 9v12h16V9l-8-6z"/>
        <circle fill="#0a0e1a" cx="12" cy="14" r="3"/>
      </svg>`
    };
    
    // Initialize Cytoscape.js topology visualization
    let cy;

    // Layout Management Functions
    const STORAGE_KEY = 'homelabviewer_layouts';
    
    function getLayouts() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? JSON.parse(stored) : {};
    }
    
    function saveLayouts(layouts) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(layouts));
    }
    
    function updateLayoutDropdown() {
      const select = document.getElementById('layout-select');
      const layouts = getLayouts();
      const currentValue = select.value;
      
      // Clear and rebuild options
      select.innerHTML = '<option value="">Select Layout...</option>';
      
      Object.keys(layouts).sort().forEach(name => {
        const option = document.createElement('option');
        option.value = name;
        option.textContent = `${name} (${new Date(layouts[name].timestamp).toLocaleDateString()})`;
        select.appendChild(option);
      });
      
      // Restore selection if it still exists
      if (currentValue && layouts[currentValue]) {
        select.value = currentValue;
      }
    }
    
    function saveLayout() {
      if (!cy) {
        alert('Topology not loaded yet');
        return;
      }
      
      const name = prompt('Enter layout name:');
      if (!name) return;
      
      if (name.trim() === '') {
        alert('Layout name cannot be empty');
        return;
      }
      
      // Get all node positions
      const positions = {};
      cy.nodes().forEach(node => {
        const pos = node.position();
        positions[node.id()] = { x: pos.x, y: pos.y };
      });
      
      // Save to localStorage
      const layouts = getLayouts();
      layouts[name] = {
        positions: positions,
        timestamp: new Date().toISOString()
      };
      saveLayouts(layouts);
      
      updateLayoutDropdown();
      document.getElementById('layout-select').value = name;
      
      console.log(`Layout "${name}" saved with ${Object.keys(positions).length} nodes`);
    }
    
    function loadLayout() {
      if (!cy) {
        alert('Topology not loaded yet');
        return;
      }
      
      const select = document.getElementById('layout-select');
      const layoutName = select.value;
      
      if (!layoutName) {
        alert('Please select a layout to load');
        return;
      }
      
      const layouts = getLayouts();
      const layout = layouts[layoutName];
      
      if (!layout) {
        alert('Layout not found');
        return;
      }
      
      // Apply saved positions
      let appliedCount = 0;
      cy.nodes().forEach(node => {
        const savedPos = layout.positions[node.id()];
        if (savedPos) {
          node.position(savedPos);
          appliedCount++;
        }
      });
      
      console.log(`Layout "${layoutName}" loaded - applied ${appliedCount} node positions`);
    }
    
    function deleteLayout() {
      const select = document.getElementById('layout-select');
      const layoutName = select.value;
      
      if (!layoutName) {
        alert('Please select a layout to delete');
        return;
      }
      
      if (!confirm(`Delete layout "${layoutName}"?`)) {
        return;
      }
      
      const layouts = getLayouts();
      delete layouts[layoutName];
      saveLayouts(layouts);
      
      updateLayoutDropdown();
      console.log(`Layout "${layoutName}" deleted`);
    }
    
    function resetLayout() {
      if (!cy) {
        alert('Topology not loaded yet');
        return;
      }
      
      if (!confirm('Reset to automatic layout? This will discard current positions.')) {
        return;
      }
      
      // Re-run the cose layout algorithm
      cy.layout({
        name: 'cose',
        animate: true,
        animationDuration: 1000,
        fit: true,
        padding: 50,
        nodeRepulsion: 8000,
        idealEdgeLength: 150,
        edgeElasticity: 100,
        gravity: 1,
        numIter: 1000,
        randomize: true
      }).run();
      
      console.log('Layout reset to automatic');
    }

    async function initTopology() {
      try {
        // Fetch topology data from API
        const response = await fetch('/api/topology');
        const data = await response.json();
        
        console.log('Fetched topology - Nodes:', data.nodes.length, 'Edges:', data.edges.length);
        
        // Initialize Cytoscape
        cy = cytoscape({
          container: document.getElementById('cy'),
          
          elements: {
            nodes: data.nodes,
            edges: data.edges
          },
          
          style: [
            // Parent/category node styles
            {
              selector: 'node[isParent]',
              style: {
                'background-color': '#1e293b',
                'background-opacity': 0.6,
                'border-width': 2,
                'border-color': '#334155',
                'label': 'data(label)',
                'text-valign': 'top',
                'text-halign': 'center',
                'text-margin-y': -10,
                'font-size': 11,
                'color': '#64748b',
                'font-weight': 600,
                'text-transform': 'uppercase',
                'padding': 15
              }
            },
            
            // Device node base style
            {
              selector: 'node[!isParent]',
              style: {
                'width': 70,
                'height': 70,
                'background-color': '#1e293b',
                'shape': 'round-rectangle',
                'border-width': 2,
                'border-color': '#475569',
                'label': 'data(label)',
                'text-valign': 'bottom',
                'text-halign': 'center',
                'text-margin-y': 8,
                'font-size': 10,
                'color': '#cbd5e1',
                'text-wrap': 'wrap',
                'text-max-width': '90px',
                'font-weight': 500
              }
            },
            
            // Router nodes - purple + router icon
            {
              selector: 'node[type="router"]',
              style: {
                'background-color': '#7c3aed',
                'border-color': '#a78bfa',
                'background-image': 'data:image/svg+xml;utf8,' + encodeURIComponent(icons['icon-router'].replace(/currentColor/g, '#ffffff')),
                'background-fit': 'none',
                'background-clip': 'none',
                'background-width': '36px',
                'background-height': '36px',
                'width': 80,
                'height': 80
              }
            },
            
            // Raspberry Pi nodes - cyan + server icon
            {
              selector: 'node[type="pi"]',
              style: {
                'background-color': '#06b6d4',
                'border-color': '#22d3ee',
                'background-image': 'data:image/svg+xml;utf8,' + encodeURIComponent(icons['icon-pi'].replace(/currentColor/g, '#ffffff')),
                'background-fit': 'none',
                'background-clip': 'none',
                'background-width': '36px',
                'background-height': '36px'
              }
            },
            
            // Streaming devices - orange + TV icon
            {
              selector: 'node[type="streaming"]',
              style: {
                'background-color': '#f97316',
                'border-color': '#fb923c',
                'background-image': 'data:image/svg+xml;utf8,' + encodeURIComponent(icons['icon-streaming'].replace(/currentColor/g, '#ffffff')),
                'background-fit': 'none',
                'background-clip': 'none',
                'background-width': '36px',
                'background-height': '36px'
              }
            },
            
            // ESP32 devices - yellow + chip icon
            {
              selector: 'node[type="esp32"]',
              style: {
                'background-color': '#eab308',
                'border-color': '#facc15',
                'background-image': 'data:image/svg+xml;utf8,' + encodeURIComponent(icons['icon-esp32'].replace(/currentColor/g, '#ffffff')),
                'background-fit': 'none',
                'background-clip': 'none',
                'background-width': '36px',
                'background-height': '36px'
              }
            },
            
            // Container/virtual - gray + stack icon
            {
              selector: 'node[type="container"]',
              style: {
                'background-color': '#6b7280',
                'border-color': '#9ca3af',
                'background-image': 'data:image/svg+xml;utf8,' + encodeURIComponent(icons['icon-container'].replace(/currentColor/g, '#ffffff')),
                'background-fit': 'none',
                'background-clip': 'none',
                'background-width': '36px',
                'background-height': '36px'
              }
            },
            
            // Default/unknown devices - blue + router icon
            {
              selector: 'node[type="unknown"]',
              style: {
                'background-color': '#3b82f6',
                'border-color': '#60a5fa',
                'background-image': 'data:image/svg+xml;utf8,' + encodeURIComponent(icons['icon-router'].replace(/currentColor/g, '#ffffff')),
                'background-fit': 'none',
                'background-clip': 'none',
                'background-width': '36px',
                'background-height': '36px'
              }
            },
            
            // Edge base style
            {
              selector: 'edge',
              style: {
                'width': 2,
                'curve-style': 'bezier'
              }
            },
            
            // Ethernet connections - solid blue
            {
              selector: 'edge[type="ethernet"]',
              style: {
                'line-color': '#58a6ff',
                'line-style': 'solid'
              }
            },
            
            // Wireless connections - dashed orange
            {
              selector: 'edge[type="wireless"]',
              style: {
                'line-color': '#f59e0b',
                'line-style': 'dashed'
              }
            },
            
            // Virtual connections - dotted gray
            {
              selector: 'edge[type="virtual"]',
              style: {
                'line-color': '#6b7280',
                'line-style': 'dotted'
              }
            },
            
            // Default edge style
            {
              selector: 'edge[type="unknown"]',
              style: {
                'line-color': '#475569',
                'line-style': 'solid'
              }
            }
          ],
          
          layout: {
            name: 'cose',
            animate: true,
            animationDuration: 1000,
            fit: true,
            padding: 50,
            nodeRepulsion: 8000,
            idealEdgeLength: 150,
            edgeElasticity: 100,
            gravity: 1,
            numIter: 1000,
            randomize: true
          }
        });
        
        console.log('Topology initialized successfully');
        
        // Populate layout dropdown with saved layouts
        updateLayoutDropdown();
        
      } catch (error) {
        console.error('Failed to initialize topology:', error);
      }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', initTopology);
  </script>
</body>
</html>
