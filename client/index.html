<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeLabViewer - Network Topology</title>
  <script src="lib/cytoscape.min.js"></script>
  <script src="lib/cola.min.js"></script>
  <script src="lib/cytoscape-cola.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #e0e0e0;
      overflow: hidden;
    }
    #header {
      height: 60px;
      background: #141824;
      border-bottom: 1px solid #2a2f3f;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #22d3ee;
      letter-spacing: 0.05em;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }
    #cy-container {
      height: calc(100vh - 60px);
      width: 100%;
      position: relative;
    }
    #cy {
      width: 100%;
      height: 100%;
      background: #0a0e1a;
    }
  </style>
</head>
<body>
  <div id="header">
    <div class="status-dot"></div>
    <h1>HomeLabViewer</h1>
  </div>
  <div id="cy-container">
    <div id="cy"></div>
  </div>
  
  <script>
    // Initialize Cytoscape.js topology visualization
    let cy;

    async function initTopology() {
      try {
        // Fetch topology data from API
        const response = await fetch('/api/topology');
        const data = await response.json();
        
        // Initialize Cytoscape
        cy = cytoscape({
          container: document.getElementById('cy'),
          
          elements: {
            nodes: data.nodes,
            edges: data.edges
          },
          
          style: [
            {
              selector: 'node',
              style: {
                'background-color': '#22d3ee',
                'label': 'data(label)',
                'color': '#e0e0e0',
                'text-valign': 'center',
                'text-halign': 'center',
                'font-size': '12px',
                'width': '60px',
                'height': '60px',
                'text-wrap': 'wrap',
                'text-max-width': '80px'
              }
            },
            {
              selector: 'node[type="router"]',
              style: {
                'background-color': '#a78bfa',
                'width': '70px',
                'height': '70px'
              }
            },
            {
              selector: 'node[type="switch"]',
              style: {
                'background-color': '#4ade80',
                'width': '80px',
                'height': '80px'
              }
            },
            {
              selector: 'node[type="raspberry-pi"]',
              style: {
                'background-color': '#22d3ee'
              }
            },
            {
              selector: 'edge',
              style: {
                'width': 2,
                'line-color': '#4ade80',
                'target-arrow-color': '#4ade80',
                'target-arrow-shape': 'triangle',
                'curve-style': 'bezier'
              }
            }
          ],
          
          layout: {
            name: 'cose',
            animate: true,
            animationDuration: 1000,
            fit: true,
            padding: 50,
            nodeRepulsion: 8000,
            idealEdgeLength: 150,
            edgeElasticity: 100,
            gravity: 1,
            numIter: 1000,
            randomize: true
          }
        });
        
        console.log('Topology initialized successfully');
        console.log('Nodes:', cy.nodes().length);
        console.log('Edges:', cy.edges().length);
        
      } catch (error) {
        console.error('Failed to initialize topology:', error);
      }
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', initTopology);
  </script>
</body>
</html>
